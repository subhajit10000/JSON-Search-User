<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Search API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>👨‍💼 User Search</h1>
        <p>Fetching users from DummyJSON API</p>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search user..." value="John">
        <button id="searchBtn">Search</button>
    </div>

    <div id="loading" class="loading">Loading Users...</div>

    <div id="usersContainer" class="users-container"></div>

    <script>
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const usersContainer = document.getElementById("usersContainer");
        const loading = document.getElementById("loading");

        async function fetchUsers(query = "John") {
            loading.style.display = "block";
            usersContainer.innerHTML = "";

            try {
                const response = await fetch(`https://dummyjson.com/users/search?q=${query}`);
                const data = await response.json();

                loading.style.display = "none";

                if (data.users.length === 0) {
                    usersContainer.innerHTML =
                        `<h2 class="not-found">No users found.</h2>`;
                    return;
                }

                data.users.forEach(user => {
                    const card = document.createElement("div");
                    card.className = "card";

                    card.innerHTML = `
                        <img src="${user.image}" alt="${user.firstName}">
                        
                        <h2>${user.firstName} ${user.lastName}</h2>
                        
                        <p><strong>Age:</strong> ${user.age}</p>
                        
                        <p><strong>Gender:</strong> ${user.gender}</p>
                        
                        <p><strong>Email:</strong> ${user.email}</p>
                        
                        <p><strong>Phone:</strong> ${user.phone}</p>
                        
                        <p><strong>Company:</strong> ${user.company.name}</p>
                        
                        <p><strong>Address:</strong> ${user.address.city}, ${user.address.state}</p>

                        <button>View Profile</button>
                    `;

                    usersContainer.appendChild(card);
                });

            } catch (error) {
                loading.style.display = "none";
                usersContainer.innerHTML =
                    `<h2 class="not-found">Something went wrong!</h2>`;
                console.log(error);
            }
        }

        fetchUsers();

        searchBtn.addEventListener("click", () => {
            const value = searchInput.value.trim();
            fetchUsers(value);
        });

        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") {
                fetchUsers(searchInput.value.trim());
            }
        });

    </script>

</body>
</html>
